spring:
  application:
    name: stablebridge-tx-recovery
  autoconfigure:
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
      - org.springframework.boot.jdbc.autoconfigure.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration
      - org.springframework.boot.data.jpa.autoconfigure.DataJpaRepositoriesAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration
      - org.springframework.boot.kafka.autoconfigure.KafkaAutoConfiguration
      - org.springframework.boot.flyway.autoconfigure.FlywayAutoConfiguration
      - io.temporal.spring.boot.autoconfigure.TemporalAutoConfiguration
  jpa:
    open-in-view: false

str:
  signer:
    backend: ${STR_SIGNER_BACKEND:}
    keystore-path: ${STR_SIGNER_KEYSTORE_PATH:}
    password: ${STR_SIGNER_PASSWORD:}
    callback:
      hmac-secret: ${STR_SIGNER_CALLBACK_HMAC_SECRET:}
      timeout: PT5S
      tls:
        verify: true
  kafka:
    enabled-chains: ethereum_mainnet,solana_mainnet
    topic-replicas: 1
  evm:
    chains:
      - name: ethereum
        rpc-urls:
          - ${EVM_ETHEREUM_RPC_URL:http://localhost:8545}
        max-fee-cap-gwei: 200
        block-time: PT12S
        rpc-timeout: PT5S
        rate-limit-per-second: 25
        rate-limit-burst: 50
      - name: base
        rpc-urls:
          - ${EVM_BASE_RPC_URL:http://localhost:8546}
        max-fee-cap-gwei: 5
        block-time: PT2S
        rpc-timeout: PT5S
        rate-limit-per-second: 25
        rate-limit-burst: 50
      - name: polygon
        rpc-urls:
          - ${EVM_POLYGON_RPC_URL:http://localhost:8547}
        max-fee-cap-gwei: 500
        block-time: PT2S
        rpc-timeout: PT5S
        rate-limit-per-second: 25
        rate-limit-burst: 50
  temporal:
    target: ${TEMPORAL_FRONTEND_URL:127.0.0.1:7233}
    namespace: stablebridge-tx-recovery
    task-queue: str-transaction-lifecycle
    workflow-execution-timeout: PT24H
    workflow-run-timeout: PT2H
  escalation:
    high-value-threshold-usd: 50000
    gas-budget:
      percentage: 0.01
      absolute-min-usd: 5
      absolute-max-usd: 500
    default-tiers:
      - level: 0
        stuck-threshold: PT1M
        gas-multiplier: 1.0
        requires-human-approval: false
        description: Initial detection - wait
      - level: 1
        stuck-threshold: PT3M
        gas-multiplier: 1.25
        requires-human-approval: false
        description: First speed-up
      - level: 2
        stuck-threshold: PT10M
        gas-multiplier: 2.0
        requires-human-approval: false
        description: Second speed-up
      - level: 3
        stuck-threshold: PT30M
        gas-multiplier: 3.0
        requires-human-approval: false
        description: Aggressive speed-up
      - level: 4
        stuck-threshold: PT30M
        gas-multiplier: 3.0
        requires-human-approval: true
        description: Human escalation
    high-value-tiers:
      - level: 0
        stuck-threshold: PT1M
        gas-multiplier: 1.0
        requires-human-approval: false
        description: Initial detection - wait
      - level: 1
        stuck-threshold: PT3M
        gas-multiplier: 1.25
        requires-human-approval: false
        description: First speed-up
      - level: 2
        stuck-threshold: PT5M
        gas-multiplier: 1.25
        requires-human-approval: true
        description: Human escalation for high-value
