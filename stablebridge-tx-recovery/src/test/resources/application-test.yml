spring:
  autoconfigure:
    exclude: []
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

str:
  signer:
    backend: local-keystore
    keystore-path: test-keystore.p12
    password: test-password
  kafka:
    enabled-chains: ethereum_mainnet,solana_mainnet
  temporal:
    enabled: false
    target: 127.0.0.1:7233
    namespace: stablebridge-tx-recovery-test
    task-queue: str-transaction-lifecycle-test
    non-retryable-exceptions:
      - com.stablebridge.txrecovery.domain.exception.NonRetryableException
      - com.stablebridge.txrecovery.domain.exception.NonceTooLowException
    activity-options:
      default-options:
        start-to-close-timeout: PT30S
        max-attempts: 3
        initial-interval: PT1S
        backoff-coefficient: 2.0
      signing:
        start-to-close-timeout: PT10S
        max-attempts: 2
        initial-interval: PT1S
        backoff-coefficient: 2.0
      confirmation:
        start-to-close-timeout: PT300S
        max-attempts: 1
        initial-interval: PT1S
        backoff-coefficient: 2.0
      recovery-execution:
        start-to-close-timeout: PT60S
        max-attempts: 3
        initial-interval: PT1S
        backoff-coefficient: 2.0
  escalation:
    high-value-threshold-usd: 50000
    gas-budget:
      percentage: 0.01
      absolute-min-usd: 5
      absolute-max-usd: 500
    default-tiers:
      - level: 0
        stuck-threshold: PT0S
        gas-multiplier: 1.0
        requires-human-approval: false
        description: Initial detection - wait
      - level: 1
        stuck-threshold: PT1M
        gas-multiplier: 1.25
        requires-human-approval: false
        description: First speed-up
      - level: 2
        stuck-threshold: PT3M
        gas-multiplier: 2.0
        requires-human-approval: false
        description: Second speed-up
      - level: 3
        stuck-threshold: PT10M
        gas-multiplier: 3.0
        requires-human-approval: false
        description: Aggressive speed-up
      - level: 4
        stuck-threshold: PT30M
        gas-multiplier: 3.0
        requires-human-approval: true
        description: Human escalation
    high-value-tiers:
      - level: 0
        stuck-threshold: PT0S
        gas-multiplier: 1.0
        requires-human-approval: false
        description: Initial detection - wait
      - level: 1
        stuck-threshold: PT1M
        gas-multiplier: 1.25
        requires-human-approval: false
        description: First speed-up
      - level: 2
        stuck-threshold: PT5M
        gas-multiplier: 1.25
        requires-human-approval: true
        description: Human escalation for high-value
